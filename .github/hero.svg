<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" role="img" aria-label="agent-memory-kits architecture: 9 agent hosts on the left connect through 3 MCP companions to a local SQLite, HNSW, and receipt store on the right">
  <defs>
    <style>
      .bg{fill:#0d1117}
      .frame{fill:#161b22;stroke:#30363d;stroke-width:1}
      .tier-label{fill:#8b949e;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:14px;letter-spacing:1px}
      .col-label{fill:#58a6ff;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:18px;font-weight:600;letter-spacing:1.5px}
      .host{fill:#1c2128;stroke:#58a6ff;stroke-width:1.25;rx:8}
      .host-text{fill:#e6edf3;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:14px;text-anchor:middle;dominant-baseline:central}
      .mcp{fill:#1c2128;stroke:#a371f7;stroke-width:1.5;rx:8}
      .mcp-text{fill:#e6edf3;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:16px;text-anchor:middle;dominant-baseline:central;font-weight:600}
      .store{fill:#1c2128;stroke:#3fb950;stroke-width:1.25;rx:8}
      .store-text{fill:#e6edf3;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:14px;text-anchor:middle;dominant-baseline:central}
      .arrow{fill:none;stroke:#58a6ff;stroke-width:0.75;opacity:0.55}
      .arrow-purple{fill:none;stroke:#a371f7;stroke-width:0.75;opacity:0.55}
      .arrow-green{fill:none;stroke:#3fb950;stroke-width:0.9;opacity:0.7}
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="600"/>

  <!-- Column 1: 9 agent hosts in 3x3 grid -->
  <text class="col-label" x="160" y="40" text-anchor="middle">9 AGENT HOSTS</text>
  <g id="hosts">
    <!-- Row 1: Tier 0 (hooked) -->
    <rect class="host" x="40"  y="80" width="160" height="60"/>
    <text class="host-text" x="120" y="110">Claude Code</text>

    <rect class="host" x="40"  y="160" width="160" height="60"/>
    <text class="host-text" x="120" y="190">Codex CLI</text>

    <rect class="host" x="40"  y="240" width="160" height="60"/>
    <text class="host-text" x="120" y="270">Hermes</text>

    <text class="tier-label" x="120" y="335" text-anchor="middle">Tier 0 — hooked</text>

    <!-- Row 2: Tier 1 (MCP + rules) -->
    <rect class="host" x="40"  y="365" width="160" height="50"/>
    <text class="host-text" x="120" y="390">Cursor</text>

    <rect class="host" x="40"  y="425" width="160" height="50"/>
    <text class="host-text" x="120" y="450">Cline</text>

    <rect class="host" x="40"  y="485" width="160" height="50"/>
    <text class="host-text" x="120" y="510">Roo Code</text>

    <!-- Row 3: Tier 1 continued -->
    <rect class="host" x="220"  y="365" width="160" height="50"/>
    <text class="host-text" x="300" y="390">Windsurf</text>

    <rect class="host" x="220"  y="425" width="160" height="50"/>
    <text class="host-text" x="300" y="450">Continue</text>

    <rect class="host" x="220"  y="485" width="160" height="50"/>
    <text class="host-text" x="300" y="510">OpenCode</text>

    <text class="tier-label" x="300" y="555" text-anchor="middle">Tier 1 — MCP + rules</text>
  </g>

  <!-- Column 2: 3 MCP companions -->
  <text class="col-label" x="600" y="40" text-anchor="middle">3 MCP COMPANIONS</text>
  <g id="mcps">
    <rect class="mcp" x="460" y="120" width="280" height="80"/>
    <text class="mcp-text" x="600" y="160">semantic-memory-mcp</text>

    <rect class="mcp" x="460" y="240" width="280" height="80"/>
    <text class="mcp-text" x="600" y="280">context-governor</text>

    <rect class="mcp" x="460" y="360" width="280" height="80"/>
    <text class="mcp-text" x="600" y="400">claim-ledger</text>
  </g>

  <!-- Column 3: local data stores -->
  <text class="col-label" x="1020" y="40" text-anchor="middle">LOCAL DATA</text>
  <g id="stores">
    <rect class="store" x="880" y="120" width="280" height="80"/>
    <text class="store-text" x="1020" y="155">SQLite + FTS5</text>
    <text class="store-text" x="1020" y="175" style="font-size:11px;fill:#8b949e">facts · metadata · FTS index</text>

    <rect class="store" x="880" y="240" width="280" height="80"/>
    <text class="store-text" x="1020" y="275">HNSW vectors</text>
    <text class="store-text" x="1020" y="295" style="font-size:11px;fill:#8b949e">usearch · nomic embeddings</text>

    <rect class="store" x="880" y="360" width="280" height="80"/>
    <text class="store-text" x="1020" y="395">Receipt store</text>
    <text class="store-text" x="1020" y="415" style="font-size:11px;fill:#8b949e">context-governor · claim-ledger</text>
  </g>

  <!-- Arrows: hosts -> MCP servers (Tier 0 + Tier 1 collapse to 3 sample hosts for clarity) -->
  <g id="h-arrows">
    <!-- Claude Code to all 3 MCPs -->
    <line class="arrow" x1="200" y1="110" x2="460" y2="160"/>
    <line class="arrow" x1="200" y1="110" x2="460" y2="280"/>
    <line class="arrow" x1="200" y1="110" x2="460" y2="400"/>

    <!-- Codex to all 3 MCPs -->
    <line class="arrow" x1="200" y1="190" x2="460" y2="160"/>
    <line class="arrow" x1="200" y1="190" x2="460" y2="280"/>
    <line class="arrow" x1="200" y1="190" x2="460" y2="400"/>

    <!-- Hermes to all 3 MCPs -->
    <line class="arrow" x1="200" y1="270" x2="460" y2="160"/>
    <line class="arrow" x1="200" y1="270" x2="460" y2="280"/>
    <line class="arrow" x1="200" y1="270" x2="460" y2="400"/>

    <!-- Sample Tier 1: Cursor to all 3 MCPs -->
    <line class="arrow" x1="200" y1="390" x2="460" y2="160"/>
    <line class="arrow" x1="200" y1="390" x2="460" y2="280"/>
    <line class="arrow" x1="200" y1="390" x2="460" y2="400"/>

    <!-- Sample Tier 1: Windsurf to all 3 MCPs -->
    <line class="arrow" x1="380" y1="390" x2="460" y2="160"/>
    <line class="arrow" x1="380" y1="390" x2="460" y2="280"/>
    <line class="arrow" x1="380" y1="390" x2="460" y2="400"/>

    <!-- Sample Tier 1: Cline to all 3 MCPs -->
    <line class="arrow" x1="200" y1="450" x2="460" y2="160"/>
    <line class="arrow" x1="200" y1="450" x2="460" y2="280"/>
    <line class="arrow" x1="200" y1="450" x2="460" y2="400"/>

    <!-- Sample Tier 1: Roo Code to all 3 MCPs -->
    <line class="arrow" x1="200" y1="510" x2="460" y2="160"/>
    <line class="arrow" x1="200" y1="510" x2="460" y2="280"/>
    <line class="arrow" x1="200" y1="510" x2="460" y2="400"/>

    <!-- Continue to all 3 MCPs -->
    <line class="arrow" x1="380" y1="450" x2="460" y2="160"/>
    <line class="arrow" x1="380" y1="450" x2="460" y2="280"/>
    <line class="arrow" x1="380" y1="450" x2="460" y2="400"/>

    <!-- OpenCode to all 3 MCPs -->
    <line class="arrow" x1="380" y1="510" x2="460" y2="160"/>
    <line class="arrow" x1="380" y1="510" x2="460" y2="280"/>
    <line class="arrow" x1="380" y1="510" x2="460" y2="400"/>
  </g>

  <!-- Arrows: MCPs to data stores -->
  <g id="m-arrows">
    <!-- semantic-memory to SQLite + HNSW -->
    <line class="arrow-purple" x1="740" y1="150" x2="880" y2="155"/>
    <line class="arrow-purple" x1="740" y1="170" x2="880" y2="275"/>

    <!-- context-governor to receipt store -->
    <line class="arrow-green" x1="740" y1="280" x2="880" y2="400"/>

    <!-- claim-ledger to receipt store -->
    <line class="arrow-green" x1="740" y1="380" x2="880" y2="410"/>
    <line class="arrow-green" x1="740" y1="400" x2="880" y2="420"/>
  </g>

  <!-- Footer -->
  <text class="tier-label" x="600" y="580" text-anchor="middle">local-first · SQLite + usearch HNSW · no cloud · no API keys</text>
</svg>
