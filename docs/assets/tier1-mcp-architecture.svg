<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">Tier 1 host MCP integration</title>
  <desc id="desc">A Tier 1 agent host connects to semantic-memory-mcp over MCP stdio and receives host-native rule files. The MCP server connects to context-governor and claim-ledger. Memory uses SQLite and usearch vectors.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#17304A" stroke-width="0.5" opacity="0.35"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#64748B"/>
    </marker>
  </defs>
  <rect width="900" height="420" rx="20" fill="#07111F"/>
  <rect width="900" height="420" rx="20" fill="url(#grid)"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <g fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)">
      <path d="M195 120H320"/>
      <path d="M195 120H130V230H320"/>
      <path d="M130 280H320"/>
      <path d="M580 180H720"/>
      <path d="M580 210H720"/>
    </g>
    <rect x="40" y="80" width="155" height="80" rx="14" fill="#152315" stroke="#84CC16"/>
    <text x="60" y="115" fill="#BEF264" font-size="14" font-weight="700">HOST</text>
    <text x="60" y="138" fill="#ECFCCB" font-size="12">MCP stdio + rules</text>
    <rect x="40" y="230" width="180" height="60" rx="12" fill="#112433" stroke="#38BDF8"/>
    <text x="60" y="255" fill="#7DD3FC" font-size="12" font-weight="700">Rule files</text>
    <text x="60" y="275" fill="#BAE6FD" font-size="11">host-native context injection</text>
    <rect x="320" y="120" width="260" height="120" rx="16" fill="#10271F" stroke="#34D399"/>
    <text x="345" y="155" fill="#6EE7B7" font-size="14" font-weight="700">semantic-memory-mcp</text>
    <text x="345" y="178" fill="#A7F3D0" font-size="12">MCP stdio</text>
    <text x="345" y="200" fill="#A7F3D0" font-size="12">witnessed retrieval</text>
    <text x="345" y="222" fill="#94A3B8" font-size="11">profile-gated tools</text>
    <rect x="720" y="140" width="140" height="50" rx="10" fill="#152315" stroke="#84CC16"/>
    <text x="740" y="170" fill="#BEF264" font-size="12">context-governor</text>
    <rect x="720" y="200" width="140" height="50" rx="10" fill="#2A1328" stroke="#F472B6"/>
    <text x="740" y="230" fill="#F9A8D4" font-size="12">claim-ledger</text>
    <rect x="345" y="280" width="210" height="50" rx="10" fill="#102333" stroke="#22D3EE"/>
    <text x="365" y="310" fill="#67E8F9" font-size="13">SQLite + FTS5 + usearch</text>
  </g>
</svg>